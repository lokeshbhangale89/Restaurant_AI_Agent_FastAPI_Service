version: "3.9"

services:
  ai-service:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=your_gemini_api_key_here
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"

  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"